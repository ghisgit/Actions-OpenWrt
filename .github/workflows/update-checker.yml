#
# Source code update checker (Manual Trigger Only)
# Fixed cache logic to compare current vs last commit
#

name: Update Checker

env:
  REPO_URL: https://github.com/hanwckf/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for cache support)
        uses: actions/checkout@v4

      - name: Restore last recorded commit hash
        id: restore_cache
        uses: actions/cache@v4
        with:
          path: .last_commit
          key: update-checker-last-commit-${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}

      - name: Fetch current HEAD commit
        id: fetch_current
        run: |
          set -euo pipefail
          git clone --depth=1 "${REPO_URL}" -b "${REPO_BRANCH}" temp_repo
          cd temp_repo
          CURRENT=$(git rev-parse HEAD)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "$CURRENT" > ../.current_commit

      - name: Compare with last recorded commit
        id: compare
        run: |
          if [ -f .last_commit ]; then
            LAST=$(cat .last_commit)
            echo "last=$LAST" >> $GITHUB_OUTPUT
            if [ "$LAST" = "$(cat .current_commit)" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No new commits. Build not triggered."
            else
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "New commit detected: $LAST → $(cat .current_commit)"
            fi
          else
            echo "last=" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "First run or no previous record. Triggering build."
          fi

      - name: Save current commit as last
        if: steps.compare.outputs.changed == 'true'
        run: cp .current_commit .last_commit

      - name: Cache the last commit hash
        if: always()
        uses: actions/cache@v4
        with:
          path: .last_commit
          key: update-checker-last-commit-${{ env.REPO_URL }}-${{ env.REPO_BRANCH }}

      - name: Trigger OpenWrt Builder
        if: steps.compare.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: Source Code Update

      - name: Cleanup
        if: always()
        run: rm -rf temp_repo .current_commit
